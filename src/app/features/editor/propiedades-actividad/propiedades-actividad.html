@if (actividad) {
<div class="panel-container">
  <div class="panel-header">
    <h3>⚙️ Propiedades Actividad</h3>
  </div>
  
  <form [formGroup]="propiedadesForm" class="panel-form">
    <div class="form-group">
      <label for="act-nombre">Nombre</label>
      <input id="act-nombre" type="text" formControlName="nombre" />
    </div>

    <div class="form-group">
      <label for="act-tipo">Tipo de Tarea</label>
      <select id="act-tipo" formControlName="tipo">
        <option value="USER">User Task</option>
        <option value="SERVICE">Service Task</option>
        <option value="SCRIPT">Script Task</option>
        <option value="MANUAL">Manual Task</option>
      </select>
    </div>
  </form>
</div>
}
