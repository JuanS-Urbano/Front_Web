<div class="app-layout">
  <app-sidebar></app-sidebar>
  <div class="layout-main">
    <app-navbar></app-navbar>
    <main class="main-content">
      <router-outlet />
    </main>
    <footer class="app-footer">
      <p>Editor de Procesos &copy; 2026 - Grupo 1</p>
    </footer>
  </div>
</div>

<!-- Toast global: disponible en todas las rutas del layout protegido -->
@if (toastService.state$ | async; as toast) {
  <app-toast-notification
    [visible]="toast.visible"
    [tipo]="toast.tipo"
    [mensaje]="toast.mensaje"
    (cerrado)="toastService.cerrar()">
  </app-toast-notification>
}
