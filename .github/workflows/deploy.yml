name: Build, Push and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/juans-urbano/front_web
  DEPLOYMENT_NAME: front-proyecto
  DEPLOY_NAMESPACE: <namespace>

jobs:
  # ============================================================
  # JOB 1: Construir imagen Docker y publicar en GHCR
  # ============================================================
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 2: Desplegar en Kubernetes
  # ============================================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Escribir kubeconfig desde secret
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Aplicar manifiestos de Kubernetes
        run: kubectl apply -f k8s/deployment.yaml

      - name: Forzar rollout para actualizar imagen :latest
        run: |
          kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.DEPLOY_NAMESPACE }}

      - name: Verificar estado del rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.DEPLOY_NAMESPACE }} --timeout=120s

      - name: Limpiar kubeconfig del runner
        if: always()
        run: rm -f $HOME/.kube/config
